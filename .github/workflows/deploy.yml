# This is a basic workflow to help you get started with Actions

name: My-first-CI-CD

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  #push:
    #branches: [ "main" ]
  #pull_request:
    #branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  Test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Connect-to-docker-hub
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Result-connect-success
        if: ${{ success() }}
        run: echo "Success"
      - name: Result-connect-false
        if: ${{ failure() }}
        run: echo "False"
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Prepare compose file
        run: cp docker-compose.yml docker-compose.yml.new

      - name: Upload docker-compose.yml to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ vars.VM_PORT || 22 }}
          source: "docker-compose.yml.new"
          target: ${{ vars.VM_DEPLOY_PATH }}

      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GTOP_PASSWORD: ${{ secrets.GTOP_PASSWORD }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
          VM_DEPLOY_PATH: ${{ vars.VM_DEPLOY_PATH }}
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ vars.VM_PORT || 22 }}
          envs: REGISTRY_URL,REGISTRY_USERNAME,REGISTRY_PASSWORD,GTOP_PASSWORD,SENDER_PASSWORD,IMAGE_TAG,VM_DEPLOY_PATH
          script: |
            set -e
            
            cd "$VM_DEPLOY_PATH"
            cat > .env <<ENVEOF
            GTOP_PASSWORD=$GTOP_PASSWORD
            SENDER_PASSWORD=$SENDER_PASSWORD
            REGISTRY_URL=$REGISTRY_URL
            IMAGE_TAG=$IMAGE_TAG
            ENVEOF
            
            chmod 600 .env
            
            docker compose \
              --env-file .env \
              -f docker-compose.yml.new \
              config >/dev/null
              
            mv docker-compose.yml.new docker-compose.yml
            
            echo "$REGISTRY_PASSWORD" |
              docker login "$REGISTRY_URL" \
              -u "$REGISTRY_USERNAME" \
              --password-stdin
