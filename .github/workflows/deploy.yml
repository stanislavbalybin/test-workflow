# This is a basic workflow to help you get started with Actions

name: My-first-CI-CD

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  #push:
    #branches: [ "main" ]
  #pull_request:
    #branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  Test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Connect-to-docker-hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Result-connect-success
        if: ${{ success() }}
        run: echo "Success"
      - name: Result-connect-false
        if: ${{ failure() }}
        run: echo "False"
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Prepare compose file
        run: cp docker-compose.yml docker-compose.yml.new

      - name: Upload docker-compose.yml to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          source: "docker-compose.yml.new"
          target: ${{ secrets.VM_DEPLOY_PATH }}
